<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Status Saver PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
        header { background: #075e54; color: white; padding: 12px 15px; display: flex; align-items: center; font-size: 19px; position: sticky; top: 0; z-index: 100;}
        .back-btn { cursor: pointer; margin-right: 15px; font-size: 20px; }
        .tabs { display: flex; background: #128c7e; position: sticky; top: 48px; z-index: 99; }
        .tab { flex: 1; text-align: center; padding: 12px; color: white; opacity: 0.7; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase;}
        .tab.active { opacity: 1; border-bottom: 3px solid white; }
        
        /* 🚀 GRID FIX: Ab statuses screen mein fit ayenge */
        .container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            padding: 10px; 
            box-sizing: border-box;
        }
        @media (min-width: 600px) { .container { grid-template-columns: repeat(3, 1fr); } }

        .card { 
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
            height: 200px; /* Thoda bara size professional lagta hai */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .media-box { width: 100%; height: 100%; cursor: pointer; }
        .card img, .card video { width: 100%; height: 100%; object-fit: cover; }
        
        .download-btn-out { 
            position: absolute; bottom: 8px; right: 8px; 
            background: #25d366; color: white; border: none; 
            border-radius: 50%; width: 36px; height: 36px; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 40px; opacity: 0.8; pointer-events: none;}

        #viewer { position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:99999; display:none; flex-direction:column; justify-content:center; }
        #viewer.active { display:flex; }
        .viewer-top { position: absolute; top:0; width:100%; padding:20px; display:flex; justify-content:space-between; color:white; z-index:100001; background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); box-sizing: border-box;}
        #viewer-content { width:100%; height:100%; display:flex; justify-content:center; align-items:center; }
        #viewer-content img, #viewer-content video { max-width:100%; max-height:100%; object-fit:contain; }
    </style>
</head>
<body>
    <header>
        <i class="fas fa-arrow-left back-btn" onclick="window.location.href='index.html'"></i>
        Status Saver
    </header>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('images')">Images</div>
        <div class="tab" onclick="switchTab('videos')">Videos</div>
    </div>

    <div class="container" id="media-container"></div>

    <div id="viewer">
        <div class="viewer-top">
            <i class="fas fa-times" style="font-size:24px;" onclick="closeViewer()"></i>
            <div>
                <i class="fas fa-share-alt" style="margin-right:20px; font-size:20px;" id="v-share"></i>
                <i class="fas fa-download" style="font-size:20px;" id="v-down"></i>
            </div>
        </div>
        <div id="viewer-content"></div>
    </div>

    <script>
        let allStatuses = [];
        let currentTab = 'images';

        window.onload = () => { setTimeout(loadFiles, 500); };

        async function loadFiles() {
            const fs = window.Capacitor.Plugins.Filesystem;
            const paths = [
                'Android/media/com.whatsapp/WhatsApp/Media/.Statuses',
                'Android/media/com.whatsapp.w4b/WhatsApp Business/Media/.Statuses'
            ];
            
            let uniqueFiles = new Map();
            for (let p of paths) {
                try {
                    let res = await fs.readdir({ path: p, directory: 'EXTERNAL_STORAGE' });
                    res.files.forEach(f => {
                        if(f.name.endsWith('.jpg') || f.name.endsWith('.mp4')) {
                            uniqueFiles.set(f.name, { name: f.name, uri: f.uri });
                        }
                    });
                } catch(e) {}
            }
            allStatuses = Array.from(uniqueFiles.values());
            render();
        }

        function render() {
            const container = document.getElementById('media-container');
            container.innerHTML = '';
            const filtered = allStatuses.filter(f => currentTab === 'images' ? f.name.endsWith('.jpg') : f.name.endsWith('.mp4'));
            
            filtered.forEach(file => {
                const src = window.Capacitor.convertFileSrc(file.uri);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="media-box" onclick="openViewer('${file.uri}', '${currentTab}')">
                        ${currentTab === 'images' ? `<img src="${src}">` : `<video src="${src}#t=0.5"></video><i class="fas fa-play play-icon"></i>`}
                    </div>
                    <button class="download-btn-out" onclick="saveFile('${file.uri}', '${file.name}')">
                        <i class="fas fa-arrow-down"></i>
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        async function saveFile(uri, name) {
            try {
                const fs = window.Capacitor.Plugins.Filesystem;
                // 🚀 GALLERY FIX: Save in a proper folder
                await fs.copy({
                    from: uri,
                    to: 'Download/' + name,
                    toDirectory: 'EXTERNAL_STORAGE'
                });
                alert("✅ Saved to Gallery (Downloads)!");
            } catch(e) { alert("Error: " + e.message); }
        }

        function openViewer(uri, type) {
            const v = document.getElementById('viewer');
            const c = document.getElementById('viewer-content');
            const src = window.Capacitor.convertFileSrc(uri);
            c.innerHTML = type === 'images' ? `<img src="${src}">` : `<video src="${src}" controls autoplay></video>`;
            document.getElementById('v-down').onclick = () => saveFile(uri, uri.split('/').pop());
            v.classList.add('active');
        }

        function closeViewer() { document.getElementById('viewer').classList.remove('active'); }
    </script>
</body>
</html>
