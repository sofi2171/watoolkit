name: Build Android APK (Latest Tech)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install -g @capacitor/cli @capacitor/core
          npm install

      - name: Build Web App Structure
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true

      - name: Sync & Update Capacitor
        run: |
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wa-toolkit-premium-apk
          # Ye magic line poore project mein APK dhoond legi:
          path: '**/*.apk'
