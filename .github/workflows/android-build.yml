name: Build Android APK (Latest Tech)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install Dependencies
        run: |
          npm install -g @capacitor/cli @capacitor/core
          npm install

      - name: Build Web App Structure
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true

      - name: Sync & Update Capacitor
        run: |
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Ye step file dhoondega aur uska path save karega
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wa-toolkit-premium-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/debug/*.aab
