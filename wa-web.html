<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WA Web - WA Toolkit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #128C7E;
            --primary-dark: #075E54;
            --bg-color: #f0f2f5;
            --white: #ffffff;
            --text-dark: #111b21;
            --text-muted: #667781;
        }

        /* Basic Reset & Screen Lock */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100vw; background-color: var(--white); color: var(--text-dark); overflow: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100dvh; width: 100%; position: relative; }

        /* Header */
        .header { background-color: var(--primary); color: var(--white); padding: 16px 20px; display: flex; align-items: center; gap: 15px; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        .header i { font-size: 20px; cursor: pointer; }
        .header h1 { font-size: 1.2rem; font-weight: 600; }

        /* Content Area */
        .content-area { flex-grow: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }

        /* Graphic/Icon */
        .hero-graphic { width: 120px; height: 120px; background: #e0f2f1; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; position: relative; }
        .hero-graphic i { font-size: 55px; color: var(--primary); }
        .qr-badge { position: absolute; bottom: 0; right: 0; background: var(--text-dark); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; border: 3px solid white; }

        .title { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; color: var(--text-dark); }
        .subtitle { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 30px; line-height: 1.5; }

        /* Steps Instructions */
        .steps-container { background: var(--bg-color); padding: 20px; border-radius: 16px; width: 100%; text-align: left; margin-bottom: 30px; }
        .steps-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 15px; color: var(--text-dark); }
        
        .step-item { display: flex; gap: 15px; margin-bottom: 15px; }
        .step-item:last-child { margin-bottom: 0; }
        .step-num { width: 28px; height: 28px; background: var(--primary); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.85rem; font-weight: 600; flex-shrink: 0; }
        .step-text { font-size: 0.85rem; color: var(--text-dark); line-height: 1.4; padding-top: 4px; }

        /* Button */
        .btn-start { background: var(--primary); color: white; border: none; padding: 16px 20px; border-radius: 12px; font-size: 1.05rem; font-weight: 600; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(18, 140, 126, 0.3); cursor: pointer; transition: 0.2s; margin-top: auto; }
        .btn-start:active { transform: scale(0.96); background: var(--primary-dark); }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <a href="index.html" style="color: white;"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>WA Web Scanner</h1>
        </div>

        <div class="content-area">
            
            <div class="hero-graphic">
                <i class="fa-solid fa-laptop"></i>
                <div class="qr-badge"><i class="fa-solid fa-qrcode"></i></div>
            </div>

            <h2 class="title">Use Dual Accounts</h2>
            <p class="subtitle">Scan the QR code to use another WhatsApp account on this same device.</p>

            <div class="steps-container">
                <div class="steps-title">How to connect:</div>
                
                <div class="step-item">
                    <div class="step-num">1</div>
                    <div class="step-text">Open WhatsApp on your other phone.</div>
                </div>
                <div class="step-item">
                    <div class="step-num">2</div>
                    <div class="step-text">Tap Menu <i class="fa-solid fa-ellipsis-vertical"></i> or Settings and select <b>Linked Devices</b>.</div>
                </div>
                <div class="step-item">
                    <div class="step-num">3</div>
                    <div class="step-text">Tap on <b>Link a device</b>.</div>
                </div>
                <div class="step-item">
                    <div class="step-num">4</div>
                    <div class="step-text">Point your phone to this screen to capture the QR code.</div>
                </div>
            </div>

            <button class="btn-start" onclick="openWhatsAppWeb()">
                Start Scanner <i class="fa-solid fa-arrow-right"></i>
            </button>

        </div>
    </div>

    <script>
        function openWhatsAppWeb() {
            // Android backend ko signal bhejna
            if (window.AndroidApp && window.AndroidApp.launchWAWeb) {
                window.AndroidApp.launchWAWeb();
            } else {
                alert("Testing Mode: This will open WhatsApp Web scanner in the real app.");
            }
        }
    </script>

</body>
</html>
