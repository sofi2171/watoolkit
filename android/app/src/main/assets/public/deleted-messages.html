<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deleted Msgs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #128C7E; --bg-color: #f0f2f5; --text-dark: #111b21; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); }
        .header { background-color: var(--primary); color: white; padding: 16px 20px; display: flex; align-items: center; gap: 15px; }
        .btn-activate { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; font-weight: 600; width: 100%; margin-top: 20px; box-shadow: 0 4px 10px rgba(18,140,126,0.3); cursor: pointer;}
        .btn-activate:active { transform: scale(0.95); }
        #permissionScreen { display: flex; flex-direction: column; align-items: center; padding: 30px; text-align: center; height: 80vh; justify-content: center;}
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color: white;"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 style="font-size: 1.2rem;">Deleted Msgs</h1>
    </div>
    
    <div id="permissionScreen">
        <i class="fa-solid fa-bell-slash" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>Enable Notification Access</h2>
        <p style="color: #667781; margin-top:10px;">We need access to read deleted messages safely in the background.</p>
        <button class="btn-activate" onclick="requestPermission()">Turn On Service</button>
    </div>

    <script>
        async function requestPermission() {
            try {
                // ڈائریکٹ نیٹو جاوا سے کنکشن
                const nativeBridge = window.Capacitor?.Plugins?.AppNativePlugin;
                if (!nativeBridge) {
                    throw new Error("Native Connection Failed. Plugin not linked.");
                }
                await nativeBridge.openNotificationSettings();
            } catch (err) {
                alert("Native Error: " + err.message);
            }
        }
    </script>

    <script>
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                // Jab user settings se wapas aaye toh half second baad page reload karo
                setTimeout(() => {
                    location.reload(); 
                }, 500);
            }
        });
    </script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
                    window.Capacitor.Plugins.App.addListener("appStateChange", ({ isActive }) => {
                        if (isActive) {
                            setTimeout(() => { location.reload(); }, 500);
                        }
                    });
                }
            }, 1000);
        });
    </script>
    </body>
</html>
